<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel="stylesheet" href="./styles/home_page.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="module" src="./../controller/home_page.js" defer></script>
</head>

<body>
    <header class="header">
        <div class="logo"><i class="fa-solid fa-earth-europe"></i></div>
        <nav class="nav">
            <a href="#" class="link-home">Home</a>
            <a href="#" class="link-profile">Profile</a>
        </nav>
    </header>

    <nav id="nav-banner">
        <div id="btn-banner-esquerdo" onclick="moverBanner('E')"><i class="fa-solid fa-angle-left"></i></div>
        <div id="banner">
            <div id="navegacao-banner">
                <div class="verm"></div>
                <div class="amar"></div>
                <div class="azul"></div>
                <div class="verd"></div>
                <div class="roxo"></div>
            </div>
        </div>
        <div id="btn-banner-direito" onclick="moverBanner('D')"><i class="fa-solid fa-angle-right"></i></div>
    </nav>

    <section id="cards_sec">
    </section>

    <!-- MODAL DE EDIÇÃO DE USUÁRIO -->
    <div id="modal-editar" class="modal-overlay" onclick="fecharModalEditar()">
        <div class="modal-container">
            <h2 class="modal-titulo">Editar Usuário</h2>

            <!-- Campo oculto para guardar o id do usuário -->
            <input type="hidden" id="input-id-usuario">

            <form id="form-editar" class="modal-form">
                <div class="form-group">
                    <label for="input-nome">Nome de usuário</label>
                    <input type="text" id="input-nome" placeholder="Ex: João Silva">
                </div>

                <div class="form-group">
                    <label for="input-profissao">Profissão</label>
                    <input type="text" id="input-profissao" placeholder="Ex: Desenvolvedor Web">
                </div>

                <div class="form-group">
                    <label for="input-img">URL da foto de perfil</label>
                    <input type="text" id="input-img" placeholder="https://...">
                </div>

                <div class="form-group">
                    <label for="input-twitter">Link do Twitter</label>
                    <input type="text" id="input-twitter" placeholder="https://twitter.com/...">
                </div>

                <div class="form-group">
                    <label for="input-github">Link do GitHub</label>
                    <input type="text" id="input-github" placeholder="https://github.com/...">
                </div>

                <div class="form-group">
                    <label for="input-cidade">Cidade</label>
                    <input type="text" id="input-cidade" placeholder="Ex: São Paulo, SP">
                </div>

                <div class="form-group">
                    <label for="input-bio">Bio</label>
                    <textarea id="input-bio" placeholder="Escreva uma breve descrição..."></textarea>
                </div>
            </form>

            <div class="modal-acoes">
                <button id="btn-fechar-modal" class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button id="btn-salvar-modal" class="btn-salvar" onclick="salvarEdicao()">Salvar</button>
            </div>
        </div>
    </div>
    <!-- MODAL DE CRIAÇÃO DE USUÁRIO -->
    <div id="modal-criar" class="modal-overlay" onclick="fecharModalCriar()">
        <div class="modal-container">
            <h2 class="modal-titulo">Criar Novo Usuário</h2>
            <form id="form-criar" class="modal-form">
                <div class="form-group">
                    <label for="input-nome-criar">Nome de usuário</label>
                    <input type="text" id="input-nome-criar" placeholder="Ex: Maria Silva">
                </div>
                <div class="form-group">
                    <label for="input-profissao-criar">Profissão</label>
                    <input type="text" id="input-profissao-criar" placeholder="Ex: Designer UX/UI">
                </div>
                <div class="form-group">
                    <label for="input-img-criar">URL da foto de perfil</label>
                    <input type="text" id="input-img-criar" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label for="input-twitter-criar">Link do Twitter</label>
                    <input type="text" id="input-twitter-criar" placeholder="https://twitter.com/...">
                </div>
                <div class="form-group">
                    <label for="input-github-criar">Link do GitHub</label>
                    <input type="text" id="input-github-criar" placeholder="https://github.com/...">
                </div>
                <div class="form-group">
                    <label for="input-cidade-criar">Cidade</label>
                    <input type="text" id="input-cidade-criar" placeholder="Ex: Rio de Janeiro, RJ">
                </div>
                <div class="form-group">
                    <label for="input-bio-criar">Bio</label>
                    <textarea id="input-bio-criar" placeholder="Escreva uma breve descrição..."></textarea>
                </div>
            </form>
            <div class="modal-acoes">
                <button id="btn-fechar-modal-criar" class="btn-cancelar" onclick="fecharModalCriar()">Cancelar</button>
                <button id="btn-salvar-modal-criar" class="btn-salvar" onclick="salvarNovoUsuario()">Salvar</button>
            </div>
        </div>

        <div id="modal-excluir" class="modal-overlay" onclick="fecharModalExcluir()">
            <div class="modal-container">
                <h2 class="modal-titulo">Confirmar Exclusão</h2>

                <p>Tem certeza que deseja apagar o perfil de <strong id="nome-usuario-excluir"></strong>?</p>

                <div class="modal-acoes">
                    <button id="btn-cancelar-excluir" class="btn-cancelar"
                        onclick="fecharModalExcluir()">Cancelar</button>
                    <button id="btn-confirmar-excluir" class="btn-salvar" onclick="salvarExclusao()">Excluir</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
